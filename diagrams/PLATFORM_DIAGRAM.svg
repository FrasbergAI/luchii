<svg width="900" height="520" xmlns="http://www.w3.org/2000/svg">
  <!-- Client -->
  <rect x="40" y="40" width="140" height="60" fill="#ffffff" stroke="#222222"/>
  <text x="110" y="75" text-anchor="middle" font-size="14">Client</text>

  <!-- API Gateway -->
  <rect x="240" y="40" width="180" height="60" fill="#f5f5f5" stroke="#222222"/>
  <text x="330" y="65" text-anchor="middle" font-size="14">API Gateway</text>
  <text x="330" y="82" text-anchor="middle" font-size="11">auth · rate limit · quotas</text>

  <!-- Region Router -->
  <rect x="480" y="40" width="180" height="60" fill="#f5f5f5" stroke="#222222"/>
  <text x="570" y="65" text-anchor="middle" font-size="14">Region Router</text>
  <text x="570" y="82" text-anchor="middle" font-size="11">us-west · eu-central · ...</text>

  <!-- Luchii Codex Core -->
  <rect x="240" y="150" width="180" height="70" fill="#ffffff" stroke="#222222"/>
  <text x="330" y="180" text-anchor="middle" font-size="14">Luchii Codex Core</text>
  <text x="330" y="198" text-anchor="middle" font-size="11">structured reasoning</text>

  <!-- Domain Engines -->
  <rect x="480" y="130" width="180" height="110" fill="#ffffff" stroke="#222222"/>
  <text x="570" y="155" text-anchor="middle" font-size="14">Domain Engines</text>
  <text x="570" y="175" text-anchor="middle" font-size="11">Species Codex</text>
  <text x="570" y="192" text-anchor="middle" font-size="11">Civilizations Atlas</text>
  <text x="570" y="209" text-anchor="middle" font-size="11">Chronicles Library</text>

  <!-- Governance Layer -->
  <rect x="240" y="270" width="180" height="110" fill="#f5f5f5" stroke="#222222"/>
  <text x="330" y="295" text-anchor="middle" font-size="14">Governance Layer</text>
  <text x="330" y="315" text-anchor="middle" font-size="11">Constitution</text>
  <text x="330" y="332" text-anchor="middle" font-size="11">Policy Engine</text>
  <text x="330" y="349" text-anchor="middle" font-size="11">Redaction</text>

  <!-- Tool-Call Engine -->
  <rect x="480" y="270" width="180" height="70" fill="#ffffff" stroke="#222222"/>
  <text x="570" y="300" text-anchor="middle" font-size="14">Tool-Call Engine</text>
  <text x="570" y="318" text-anchor="middle" font-size="11">schemas · execution</text>

  <!-- Logging Layer -->
  <rect x="240" y="410" width="180" height="60" fill="#ffffff" stroke="#222222"/>
  <text x="330" y="435" text-anchor="middle" font-size="14">Logging Layer</text>
  <text x="330" y="452" text-anchor="middle" font-size="11">Supabase / Postgres</text>

  <!-- Response -->
  <rect x="480" y="410" width="180" height="60" fill="#ffffff" stroke="#222222"/>
  <text x="570" y="435" text-anchor="middle" font-size="14">Response</text>

  <!-- Arrows -->
  <line x1="180" y1="70" x2="240" y2="70" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="420" y1="70" x2="480" y2="70" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="330" y1="100" x2="330" y2="150" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="420" y1="180" x2="480" y2="180" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="330" y1="220" x2="330" y2="270" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="420" y1="305" x2="480" y2="305" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="330" y1="380" x2="330" y2="410" stroke="#222222" marker-end="url(#arrow)"/>
  <line x1="420" y1="440" x2="480" y2="440" stroke="#222222" marker-end="url(#arrow)"/>

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="5" refY="3" orient="auto">
      <path d="M0,0 L0,6 L6,3 z" fill="#222222" />
    </marker>
  </defs>
</svg>
