version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: autonomous_cloud
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Autonomous Cloud API
  api:
    build:
      context: .
      dockerfile: Dockerfile.autonomous
    environment:
      NODE_ENV: development
      PORT: 3001
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: autonomous_cloud
      JWT_SECRET: dev-secret-key
      REGIONS: us-west,us-east,eu-central,apac,latam,middle-east,africa
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./dist:/app/dist
    command: npm start

  # Console UI (optional)
  console:
    image: node:18-alpine
    working_dir: /app
    volumes:
      - ./console:/app
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:3001/api/v1
    command: npm run dev

volumes:
  postgres_data:

networks:
  default:
    name: autonomous-cloud
