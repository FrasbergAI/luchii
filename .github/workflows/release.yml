name: Luchii Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install build and docs tooling
        run: |
          python -m pip install --upgrade pip
          pip install build mkdocs mkdocs-material pytest

      - name: Run validation
        run: |
          pip install -r requirements.txt
          PYTHONPATH=src pytest tests -q
          mkdocs build --strict

      - name: Build package
        run: python -m build