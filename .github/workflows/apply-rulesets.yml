name: Apply Branch Rulesets

on:
  workflow_dispatch:
  push:
    branches:
      - 'copilot/create-and-apply-branch-rulesets'

permissions: write-all

jobs:
  apply-rulesets:
    runs-on: ubuntu-latest
    name: Create and Apply Branch Rulesets
    steps:
      - name: Create dev branch if not exists
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/branches/dev")

          if [ "$STATUS" = "404" ]; then
            MAIN_SHA=$(curl -sf \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/git/ref/heads/main" \
              | python3 -c "import json,sys; print(json.load(sys.stdin)['object']['sha'])")
            curl -sf -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Content-Type: application/json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              -d "{\"ref\":\"refs/heads/dev\",\"sha\":\"$MAIN_SHA\"}" \
              "https://api.github.com/repos/${{ github.repository }}/git/refs"
            echo "✅ Created dev branch from main ($MAIN_SHA)"
          else
            echo "ℹ️  dev branch already exists (HTTP $STATUS)"
          fi

      - name: Delete existing rulesets (idempotent cleanup)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RULESETS=$(curl -sf \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            "https://api.github.com/repos/${{ github.repository }}/rulesets" \
            | python3 -c "
          import json, sys
          data = json.load(sys.stdin)
          names = ['Protect all branches']
          ids = [r['id'] for r in data if r['name'] in names]
          print(' '.join(map(str, ids)))
          ")
          for id in $RULESETS; do
            curl -sf -X DELETE \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/${{ github.repository }}/rulesets/$id"
            echo "🗑️  Deleted existing ruleset id=$id"
          done

      - name: Create and verify ruleset for all branches
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 << 'EOF'
          import json, os, subprocess, sys, time

          repo = os.environ["GITHUB_REPOSITORY"]
          token = os.environ["GITHUB_TOKEN"]
          api = f"https://api.github.com/repos/{repo}"
          headers = [
              "-H", f"Authorization: token {token}",
              "-H", "Content-Type: application/json",
              "-H", "X-GitHub-Api-Version: 2022-11-28",
          ]

          def run(args, input_data=None):
              result = subprocess.run(args, input=input_data, capture_output=True, text=True)
              if result.returncode != 0:
                  print(result.stdout)
                  print(result.stderr, file=sys.stderr)
                  raise SystemExit(result.returncode)
              return result

          def create_ruleset():
              payload = {
                  "name": "Protect all branches",
                  "target": "branch",
                  "enforcement": "active",
                  "conditions": {
                      "ref_name": {
                          "include": ["~ALL"],
                          "exclude": []
                      }
                  },
                  "rules": [
                      {
                          "type": "pull_request",
                          "parameters": {
                              "required_approving_review_count": 1,
                              "dismiss_stale_reviews_on_push": True,
                              "require_code_owner_review": False,
                              "require_last_push_approval": False,
                              "required_review_thread_resolution": True
                          }
                      },
                      {"type": "required_linear_history"},
                      {"type": "required_signatures"},
                      {"type": "deletion"},
                      {"type": "non_fast_forward"}
                  ]
              }
              result = run(["curl", "-sf", "-X", "POST", *headers, "-d", json.dumps(payload), f"{api}/rulesets"])
              data = json.loads(result.stdout)
              if "id" not in data:
                  raise SystemExit(f"failed to create ruleset: {result.stdout}")
              return data["id"]

          def get_ruleset(ruleset_id):
              result = run(["curl", "-sf", *headers, f"{api}/rulesets/{ruleset_id}"])
              return json.loads(result.stdout)

          def targeted_branch_count(ruleset):
              targets = ruleset.get("conditions", {}).get("ref_name", {}).get("include", [])
              if "~ALL" in targets:
                  return -1
              return len(targets)

          ruleset_id = None
          last = None
          for attempt in range(1, 3):
              if ruleset_id:
                  run(["curl", "-sf", "-X", "DELETE", *headers, f"{api}/rulesets/{ruleset_id}"])
                  time.sleep(1)
              ruleset_id = create_ruleset()
              last = get_ruleset(ruleset_id)
              targeted = targeted_branch_count(last)
              if targeted == 0:
                  print(json.dumps(last, indent=2))
                  raise SystemExit("ruleset created but targets 0 branches")
              if targeted > 0 or targeted == -1:
                  print(f"✅ Created 'Protect all branches' ruleset (id={ruleset_id})")
                  print("✅ GitHub reported a valid branch target set")
                  break
          else:
              raise SystemExit("ruleset creation failed twice")

          if last is None:
              raise SystemExit("ruleset verification failed")
          EOF

      - name: Summary
        run: |
          echo ""
          echo "=== Branch Rulesets Applied ==="
          echo "  ✅ Protect all branches — block force-push + delete, PR review, signed commits, linear history"
          echo ""
          echo "  ⚠️  required_status_checks omitted: no CI/test workflow exists yet."
          echo "     Add one and reference its job name in the ruleset to enable it."
          echo "  ⚠️  require_code_owner_review disabled until CODEOWNERS exists."
          echo "     Create .github/CODEOWNERS to assign reviewers."
