name: AI Court CD

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        region: [us-west-2, us-east-1, eu-central-1]

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ matrix.region }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig --name ai-court-${{ matrix.region }} --region ${{ matrix.region }}

      - name: Deploy with Helm
        run: |
          helm repo add frasberg https://helm.frasberg.ai
          helm repo update
          helm upgrade --install ai-court frasberg/luchii \
            --namespace default \
            --values ./ai-court/helm/luchii/values.yaml \
            --values ./ai-court/helm/luchii/values-${{ matrix.region }}.yaml \
            --set image.tag=${{ github.sha }}

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/ai-court-gateway -n default
          kubectl get svc -n default
