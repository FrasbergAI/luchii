name: Policy-as-Code Governance

on:
  pull_request:
    branches:
      - dev
      - staging
      - main
      - feature/*

jobs:
  validate-governance:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install policy dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyyaml

      - name: Run governance checks
        run: |
          python .github/policy/check_governance.py
