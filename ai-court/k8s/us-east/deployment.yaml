apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-court-gateway
  namespace: default
  labels:
    app: ai-court
    region: us-east-1
spec:
  replicas: 3
  selector:
    matchLabels:
      app: ai-court-gateway
  template:
    metadata:
      labels:
        app: ai-court-gateway
    spec:
      containers:
        - name: gateway
          image: ai-court:gateway-1.0.0
          ports:
            - containerPort: 3000
          env:
            - name: CASE_URL
              value: "http://case-service:3001"
            - name: EVIDENCE_URL
              value: "http://evidence-service:3002"
            - name: LAW_URL
              value: "http://law-service:3003"
            - name: INTEGRITY_URL
              value: "http://integrity-service:3004"
            - name: AUDIT_URL
              value: "http://audit-service:3005"
            - name: USER_URL
              value: "http://user-service:3006"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: region
                    operator: In
                    values:
                      - us-east-1
