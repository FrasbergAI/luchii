name: Local Dev Build & Test

on:
  pull_request:
    branches:
      - main
      - dev
      - develop
  push:
    branches:
      - main
      - dev
      - develop
  workflow_dispatch:

jobs:
  backend-tests:
    name: Backend Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install flake8 mypy pytest pytest-cov

      - name: Lint code
        run: flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Type check
        run: mypy . --ignore-missing-imports
        continue-on-error: true

      - name: Run unit tests
        env:
          FRASBERGAI_DB_URL: postgresql://test_user:test_password@localhost:5432/test_db
        run: pytest tests/ -v --cov=src --cov-report=xml

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./coverage.xml

  ui-tests:
    name: UI Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: npm
          cache-dependency-path: ui/package-lock.json

      - name: Install dependencies
        working-directory: ui
        run: npm ci

      - name: Type check
        working-directory: ui
        run: npm run lint
        continue-on-error: true

      - name: Run UI tests
        working-directory: ui
        run: npm run test -- --coverage
        continue-on-error: true

      - name: Build UI
        working-directory: ui
        run: npm run build

      - name: Upload UI build artifacts
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: ui-dist
          path: ui/dist/

  docker-build:
    name: Docker Build Check
    runs-on: ubuntu-latest
    if: always()

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build backend Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile
          push: false
          tags: luchii:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build UI Docker image
        uses: docker/build-push-action@v4
        with:
          context: ./ui
          file: ./ui/Dockerfile.local
          push: false
          tags: luchii-ui:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-summary:
    name: Test Results Summary
    runs-on: ubuntu-latest
    needs: [backend-tests, ui-tests, docker-build]
    if: always()

    steps:
      - name: Check test results
        run: |
          if [[ "${{ needs.backend-tests.result }}" == "failure" || "${{ needs.ui-tests.result }}" == "failure" ]]; then
            echo "❌ Some tests failed. Please review the logs above."
            exit 1
          fi
          echo "✅ All tests passed successfully!"
